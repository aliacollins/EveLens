name: Build and Test

on:
  push:
    branches: [ experimental/*, feature/*, alpha, beta ]
  pull_request:
    branches: [ main, alpha, beta ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore EVEMon.sln

    - name: Build
      run: dotnet build EVEMon.sln -c Debug --no-restore

    - name: Run tests
      run: dotnet test tests/EVEMon.Tests/EVEMon.Tests.csproj --no-build -c Debug --verbosity minimal

    - name: Verify test count
      shell: pwsh
      run: |
        $output = dotnet test tests/EVEMon.Tests/EVEMon.Tests.csproj --no-build -c Debug --verbosity minimal 2>&1
        $match = $output | Select-String "Passed:\s+(\d+)"
        if ($match) {
          $passed = [int]$match.Matches[0].Groups[1].Value
          if ($passed -lt 800) {
            Write-Error "Only $passed tests passed. Expected 800+. Did tests get deleted?"
            exit 1
          }
          Write-Host "Test count OK: $passed tests passed"
        }
