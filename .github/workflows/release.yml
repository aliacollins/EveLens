name: Build & Release

on:
  push:
    branches: [alpha, beta, main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: EveLens
  MAIN_PROJECT: src/EveLens.Avalonia/EveLens.Avalonia.csproj
  TEST_PROJECT: tests/EveLens.Tests/EveLens.Tests.csproj

jobs:
  # ── Version ──
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.calc.outputs.semver }}
      channel: ${{ steps.calc.outputs.channel }}
      prerelease: ${{ steps.calc.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.6.x'

      - name: Run GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2
        with:
          configFilePath: GitVersion.yml

      - name: Set outputs
        id: calc
        run: |
          semver="${{ steps.gitversion.outputs.fullSemVer }}"
          branch="${{ github.ref_name }}"

          echo "semver=$semver" >> $GITHUB_OUTPUT

          case "$branch" in
            main)  echo "channel=stable" >> $GITHUB_OUTPUT; echo "prerelease=false" >> $GITHUB_OUTPUT ;;
            beta)  echo "channel=beta" >> $GITHUB_OUTPUT;   echo "prerelease=true" >> $GITHUB_OUTPUT ;;
            *)     echo "channel=alpha" >> $GITHUB_OUTPUT;  echo "prerelease=true" >> $GITHUB_OUTPUT ;;
          esac

          echo "### Version: $semver (branch: $branch)" >> $GITHUB_STEP_SUMMARY

  # ── Tests ──
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet test ${{ env.TEST_PROJECT }} --verbosity minimal

  # ── Build Windows ──
  build-windows:
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            -c Release -r win-x64 --self-contained `
            -o publish/win-x64 `
            -p:Version=${{ needs.version.outputs.semver }}
      - name: Pack
        run: |
          dotnet tool install -g vpk
          vpk pack `
            -u ${{ env.APP_NAME }} `
            -v ${{ needs.version.outputs.semver }} `
            -p publish/win-x64 `
            -e EveLens.exe `
            --channel ${{ needs.version.outputs.channel }} `
            -o releases/win
      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: releases/win/

  # ── Build Linux ──
  build-linux:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r linux-x64 --self-contained \
            -o publish/linux-x64 \
            -p:Version=${{ needs.version.outputs.semver }}
      - name: Pack
        run: |
          dotnet tool install -g vpk
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/linux-x64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/linux
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: releases/linux/

  # ── Build macOS ──
  build-macos:
    needs: [version, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r osx-arm64 --self-contained \
            -o publish/osx-arm64 \
            -p:Version=${{ needs.version.outputs.semver }}
      - name: Pack
        run: |
          dotnet tool install -g vpk
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/osx-arm64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/osx
      - uses: actions/upload-artifact@v4
        with:
          name: release-osx
          path: releases/osx/

  # ── Publish to GitHub Releases ──
  publish:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: all-releases/

      - name: Build release notes
        run: |
          version="${{ needs.version.outputs.semver }}"

          # Extract [Unreleased] from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            changelog=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
            if [ -z "$(echo "$changelog" | tr -d '[:space:]')" ]; then
              changelog=$(awk '/^## \[[0-9]/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
            fi
          else
            changelog="See commit history for changes."
          fi

          # Previous release tag for comparison
          prev_tag=$(git tag --list "v1.*" --sort=-v:refname | head -1 || echo "")

          # Commits since last release
          if [ -n "$prev_tag" ]; then
            commits=$(git log "${prev_tag}..HEAD" --oneline --no-merges 2>/dev/null | head -30)
            compare="https://github.com/aliacollins/evelens/compare/${prev_tag}...v${version}"
          else
            commits=$(git log --oneline --no-merges -20 2>/dev/null)
            compare=""
          fi

          # Assemble
          {
            echo "## What's New in ${version}"
            echo ""
            echo "$changelog"
            echo ""
            echo "---"
            echo ""
            echo "<details>"
            echo "<summary>Commits since ${prev_tag:-initial}</summary>"
            echo ""
            echo "$commits" | sed 's/^/- /'
            echo ""
            echo "</details>"
            [ -n "$compare" ] && echo "" && echo "**Full Changelog**: ${compare}"
          } > release-notes.md

          cat release-notes.md

      - name: Collect files
        run: |
          mkdir -p releases
          cp all-releases/release-win/* releases/ 2>/dev/null || true
          cp all-releases/release-linux/* releases/ 2>/dev/null || true
          cp all-releases/release-osx/* releases/ 2>/dev/null || true
          ls -la releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: ${{ env.APP_NAME }} ${{ needs.version.outputs.semver }}
          body_path: release-notes.md
          prerelease: ${{ needs.version.outputs.prerelease }}
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
