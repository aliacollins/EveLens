name: Build & Release

on:
  push:
    branches: [alpha, beta, main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: EveLens
  MAIN_PROJECT: src/EveLens.Avalonia/EveLens.Avalonia.csproj
  TEST_PROJECT: tests/EveLens.Tests/EveLens.Tests.csproj

jobs:
  # ── Calculate version via GitVersion ──
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      channel: ${{ steps.version.outputs.channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2
        with:
          configFilePath: GitVersion.yml

      - name: Set outputs
        id: version
        run: |
          echo "semver=${{ steps.gitversion.outputs.fullSemVer }}" >> $GITHUB_OUTPUT

          branch="${{ github.ref_name }}"
          if [ "$branch" = "main" ]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [ "$branch" = "beta" ]; then
            echo "channel=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "channel=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

          echo "### Version: ${{ steps.gitversion.outputs.fullSemVer }} (branch: $branch)" >> $GITHUB_STEP_SUMMARY

  # ── Run tests ──
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} --verbosity minimal

  # ── Build Windows ──
  build-windows:
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            -c Release -r win-x64 --self-contained `
            -o publish/win-x64 `
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack `
            -u ${{ env.APP_NAME }} `
            -v ${{ needs.version.outputs.semver }} `
            -p publish/win-x64 `
            -e EveLens.exe `
            --channel ${{ needs.version.outputs.channel }} `
            -o releases/win

      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: releases/win/

  # ── Build Linux ──
  build-linux:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r linux-x64 --self-contained \
            -o publish/linux-x64 \
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/linux-x64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/linux

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: releases/linux/

  # ── Build macOS ──
  build-macos:
    needs: [version, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish ARM64
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r osx-arm64 --self-contained \
            -o publish/osx-arm64 \
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/osx-arm64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/osx

      - uses: actions/upload-artifact@v4
        with:
          name: release-osx
          path: releases/osx/

  # ── Publish to GitHub Releases ──
  publish:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-releases/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          # Extract the [Unreleased] section as release notes
          # Falls back to the latest versioned section if [Unreleased] is empty
          notes=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)

          if [ -z "$(echo "$notes" | tr -d '[:space:]')" ]; then
            # [Unreleased] is empty — use the latest versioned section
            notes=$(awk '/^## \[[0-9]/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          fi

          # Write to file for the release action
          echo "$notes" > /tmp/release-notes.md
          echo "### Version ${{ needs.version.outputs.semver }}" | cat - /tmp/release-notes.md > /tmp/release-notes-final.md
          mv /tmp/release-notes-final.md /tmp/release-notes.md

          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Collect release files
        run: |
          mkdir -p releases
          cp all-releases/release-win/* releases/ 2>/dev/null || true
          cp all-releases/release-linux/* releases/ 2>/dev/null || true
          cp all-releases/release-osx/* releases/ 2>/dev/null || true
          echo "Release files:"
          ls -la releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: ${{ env.APP_NAME }} ${{ needs.version.outputs.semver }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ needs.version.outputs.prerelease }}
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
