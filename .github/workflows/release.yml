name: Build & Release

on:
  push:
    branches: [alpha, beta, main]

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: EveLens
  MAIN_PROJECT: src/EveLens.Avalonia/EveLens.Avalonia.csproj
  TEST_PROJECT: tests/EveLens.Tests/EveLens.Tests.csproj

jobs:
  # ── Calculate version via GitVersion ──
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      channel: ${{ steps.version.outputs.channel }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2
        with:
          configFilePath: GitVersion.yml

      - name: Set outputs
        id: version
        run: |
          echo "semver=${{ steps.gitversion.outputs.fullSemVer }}" >> $GITHUB_OUTPUT

          branch="${{ github.ref_name }}"
          if [ "$branch" = "main" ]; then
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          elif [ "$branch" = "beta" ]; then
            echo "channel=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "channel=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

          echo "### Version: ${{ steps.gitversion.outputs.fullSemVer }} (branch: $branch)" >> $GITHUB_STEP_SUMMARY

  # ── Run tests ──
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run tests
        run: dotnet test ${{ env.TEST_PROJECT }} --verbosity minimal

  # ── Build Windows ──
  build-windows:
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} `
            -c Release -r win-x64 --self-contained `
            -o publish/win-x64 `
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack `
            -u ${{ env.APP_NAME }} `
            -v ${{ needs.version.outputs.semver }} `
            -p publish/win-x64 `
            -e EveLens.exe `
            --channel ${{ needs.version.outputs.channel }} `
            -o releases/win

      - uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: releases/win/

  # ── Build Linux ──
  build-linux:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r linux-x64 --self-contained \
            -o publish/linux-x64 \
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/linux-x64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/linux

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: releases/linux/

  # ── Build macOS ──
  build-macos:
    needs: [version, test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Publish ARM64
        run: |
          dotnet publish ${{ env.MAIN_PROJECT }} \
            -c Release -r osx-arm64 --self-contained \
            -o publish/osx-arm64 \
            -p:Version=${{ needs.version.outputs.semver }}

      - name: Pack with Velopack
        run: |
          vpk pack \
            -u ${{ env.APP_NAME }} \
            -v ${{ needs.version.outputs.semver }} \
            -p publish/osx-arm64 \
            -e EveLens \
            --channel ${{ needs.version.outputs.channel }} \
            -o releases/osx

      - uses: actions/upload-artifact@v4
        with:
          name: release-osx
          path: releases/osx/

  # ── Publish to GitHub Releases ──
  publish:
    needs: [version, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-releases/

      - name: Build release notes
        id: notes
        run: |
          version="${{ needs.version.outputs.semver }}"
          channel="${{ needs.version.outputs.channel }}"

          # Find the previous release tag for comparison
          prev_tag=$(git tag --list "v*" --sort=-v:refname | head -1 || echo "")
          echo "Previous tag: ${prev_tag:-none}"

          # ── Section 1: Curated notes from CHANGELOG.md ──
          changelog=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)

          if [ -z "$(echo "$changelog" | tr -d '[:space:]')" ]; then
            changelog=$(awk '/^## \[[0-9]/{if(found) exit; found=1; next} found{print}' CHANGELOG.md)
          fi

          # ── Section 2: Auto-generated commit list since last tag ──
          if [ -n "$prev_tag" ]; then
            commits=$(git log "${prev_tag}..HEAD" --oneline --no-merges 2>/dev/null | head -30)
            comparison_url="https://github.com/aliacollins/evelens/compare/${prev_tag}...v${version}"
          else
            commits=$(git log --oneline --no-merges -20 2>/dev/null)
            comparison_url=""
          fi

          # ── Assemble release notes ──
          cat > /tmp/release-notes.md << NOTES_EOF
          ## What's New

          ${changelog}

          ---

          <details>
          <summary>Commits since ${prev_tag:-initial}</summary>

          $(echo "$commits" | sed 's/^/- /')

          </details>
          NOTES_EOF

          # Add full changelog link if we have a previous tag
          if [ -n "$comparison_url" ]; then
            echo "" >> /tmp/release-notes.md
            echo "**Full Changelog**: ${comparison_url}" >> /tmp/release-notes.md
          fi

          # Clean up leading whitespace from heredoc
          sed -i 's/^          //' /tmp/release-notes.md

          echo "Release notes:"
          cat /tmp/release-notes.md

      - name: Collect release files
        run: |
          mkdir -p releases
          cp all-releases/release-win/* releases/ 2>/dev/null || true
          cp all-releases/release-linux/* releases/ 2>/dev/null || true
          cp all-releases/release-osx/* releases/ 2>/dev/null || true
          echo "Release files:"
          ls -la releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: ${{ env.APP_NAME }} ${{ needs.version.outputs.semver }}
          body_path: /tmp/release-notes.md
          prerelease: ${{ needs.version.outputs.prerelease }}
          files: releases/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
