mode: ContinuousDeployment

branches:
  main:
    regex: ^main$
    label: ''
    increment: Patch

  alpha:
    regex: ^alpha$
    label: alpha
    increment: Minor

  beta:
    regex: ^beta$
    label: beta
    increment: Patch

  feature:
    regex: ^feature[/-]
    label: 'alpha.{BranchName}'
    increment: Inherit

  fix:
    regex: ^fix[/-]
    label: 'alpha.{BranchName}'
    increment: Patch
