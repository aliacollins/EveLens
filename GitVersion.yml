mode: ContinuousDelivery
next-version: 1.0.0

branches:
  main:
    regex: ^main$
    label: ''
    increment: Patch
    mode: ContinuousDeployment
    is-main-branch: true

  alpha:
    regex: ^alpha$
    label: alpha
    increment: Minor
    mode: ContinuousDelivery

  beta:
    regex: ^beta$
    label: beta
    increment: Patch
    mode: ContinuousDelivery

  feature:
    regex: ^feature[/-]
    label: 'alpha.{BranchName}'
    increment: Inherit

  fix:
    regex: ^fix[/-]
    label: 'alpha.{BranchName}'
    increment: Patch
